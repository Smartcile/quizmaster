services:
  postgres:
    image: postgres:15-alpine
    container_name: quiz-master-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-quiz_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-quiz_password}
      POSTGRES_DB: ${DB_NAME:-quiz_master}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-quiz_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quiz-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quiz-master-backend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-quiz_user}
      DB_PASSWORD: ${DB_PASSWORD:-quiz_password}
      DB_NAME: ${DB_NAME:-quiz_master}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      # Optional: set custom public URLs so the Admin lobby shows the correct
      # quizzer/slideshow links when portals are on different domains.
      # QUIZZER_URL: ${QUIZZER_URL:-}
      # SLIDESHOW_URL: ${SLIDESHOW_URL:-}
      # ADMIN_URL: ${ADMIN_URL:-}
    # Backend is only reached via frontend nginx proxies - no host port needed.
    # Uncomment to expose for direct API testing:
    # ports:
    #   - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - quiz-network
    restart: unless-stopped

  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
    container_name: quiz-master-admin
    ports:
      - "${ADMIN_PORT:-3001}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - quiz-network
    restart: unless-stopped

  frontend-slideshow:
    build:
      context: ./frontend-slideshow
      dockerfile: Dockerfile
    container_name: quiz-master-slideshow
    ports:
      - "${SLIDESHOW_PORT:-3002}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - quiz-network
    restart: unless-stopped

  frontend-quizzer:
    build:
      context: ./frontend-quizzer
      dockerfile: Dockerfile
    container_name: quiz-master-quizzer
    ports:
      - "${QUIZZER_PORT:-3003}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - quiz-network
    restart: unless-stopped

volumes:
  postgres_data:
  backend_uploads:

networks:
  quiz-network:
    driver: bridge
