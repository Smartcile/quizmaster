version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: quiz-master-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-quiz_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-quiz_password}
      POSTGRES_DB: ${DB_NAME:-quiz_master}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-quiz_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quiz-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quiz-master-backend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-quiz_user}
      DB_PASSWORD: ${DB_PASSWORD:-quiz_password}
      DB_NAME: ${DB_NAME:-quiz_master}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - quiz-network
    restart: unless-stopped

  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
    container_name: quiz-master-admin
    ports:
      - "3001:3001"
    environment:
      VITE_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - quiz-network
    restart: unless-stopped

  frontend-slideshow:
    build:
      context: ./frontend-slideshow
      dockerfile: Dockerfile
    container_name: quiz-master-slideshow
    ports:
      - "3002:3002"
    environment:
      VITE_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - quiz-network
    restart: unless-stopped

  frontend-quizzer:
    build:
      context: ./frontend-quizzer
      dockerfile: Dockerfile
    container_name: quiz-master-quizzer
    ports:
      - "3003:3003"
    environment:
      VITE_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - quiz-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: quiz-master-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend-admin
      - frontend-slideshow
      - frontend-quizzer
    networks:
      - quiz-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  quiz-network:
    driver: bridge
