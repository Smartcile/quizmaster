name: Build and Push Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Admin Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend-admin/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend-admin:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Slideshow Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend-slideshow/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend-slideshow:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Quizzer Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend-quizzer/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend-quizzer:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
