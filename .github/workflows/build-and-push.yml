name: Build and Push Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Opt JavaScript actions into Node.js 24 now (GitHub forces this on 2026-06-16).
  # checkout@v5 is natively Node 24; the docker/* actions are already on their
  # latest major tags and run fine on Node 24 under this flag.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set lowercase image prefix
        run: echo "IMAGE_PREFIX=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/backend:latest
            ${{ env.IMAGE_PREFIX }}/backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push Admin Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend-admin
          file: ./frontend-admin/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/frontend-admin:latest
            ${{ env.IMAGE_PREFIX }}/frontend-admin:${{ github.sha }}
          cache-from: type=gha,scope=frontend-admin
          cache-to: type=gha,mode=max,scope=frontend-admin

      - name: Build and push Slideshow Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend-slideshow
          file: ./frontend-slideshow/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/frontend-slideshow:latest
            ${{ env.IMAGE_PREFIX }}/frontend-slideshow:${{ github.sha }}
          cache-from: type=gha,scope=frontend-slideshow
          cache-to: type=gha,mode=max,scope=frontend-slideshow

      - name: Build and push Quizzer Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend-quizzer
          file: ./frontend-quizzer/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/frontend-quizzer:latest
            ${{ env.IMAGE_PREFIX }}/frontend-quizzer:${{ github.sha }}
          cache-from: type=gha,scope=frontend-quizzer
          cache-to: type=gha,mode=max,scope=frontend-quizzer
