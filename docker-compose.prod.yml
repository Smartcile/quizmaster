# Quiz Master - Production Deployment (Pre-built Images, No Rebuild)
# Each frontend container includes nginx that proxies /api to the backend.
# Access via any hostname (localhost, IP, or Cloudflare domain) - it just works.
#
# Usage: docker-compose -f docker-compose.prod.yml up -d

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-quiz_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-quiz_password}
      POSTGRES_DB: ${DB_NAME:-quiz_master}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-quiz_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quiz-network
    restart: unless-stopped

  backend:
    image: ghcr.io/smartcile/quizmaster/backend:latest
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-quiz_user}
      DB_PASSWORD: ${DB_PASSWORD:-quiz_password}
      DB_NAME: ${DB_NAME:-quiz_master}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      # Optional: set custom public URLs so the Admin lobby shows the correct
      # quizzer/slideshow links when portals are on different domains.
      # Used by QuizControl to build the portal link buttons (lobby + active).
      # Leave unset to use the hostname:port fallback.
      # QUIZZER_URL: ${QUIZZER_URL:-}
      # SLIDESHOW_URL: ${SLIDESHOW_URL:-}
      # ADMIN_URL: ${ADMIN_URL:-}
    # Backend is reached internally via the Docker network from the frontend
    # nginx proxies. No host port needed unless you want direct API access.
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - quiz-network
    restart: unless-stopped

  frontend-admin:
    image: ghcr.io/smartcile/quizmaster/frontend-admin:latest
    ports:
      - "${ADMIN_PORT:-3001}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - quiz-network
    restart: unless-stopped

  frontend-slideshow:
    image: ghcr.io/smartcile/quizmaster/frontend-slideshow:latest
    ports:
      - "${SLIDESHOW_PORT:-3002}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - quiz-network
    restart: unless-stopped

  frontend-quizzer:
    image: ghcr.io/smartcile/quizmaster/frontend-quizzer:latest
    ports:
      - "${QUIZZER_PORT:-3003}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - quiz-network
    restart: unless-stopped

volumes:
  postgres_data:
  backend_uploads:

networks:
  quiz-network:
    driver: bridge
