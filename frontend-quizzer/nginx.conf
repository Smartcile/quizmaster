server {
  listen 80;
  server_name _;
  client_max_body_size 50M;

  # Docker's embedded DNS. Using a variable in proxy_pass forces nginx to
  # re-resolve `backend` per request (cached briefly via valid=) instead of
  # caching its IP once at startup — so recreating/redeploying the backend
  # container no longer strands this nginx on a stale IP (the cause of 502s
  # after a redeploy).
  resolver 127.0.0.11 valid=10s ipv6=off;

  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    set $backend backend:5000;
    proxy_pass http://$backend$request_uri;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /socket.io/ {
    set $backend backend:5000;
    proxy_pass http://$backend$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
  }

  location /uploads/ {
    set $backend backend:5000;
    proxy_pass http://$backend$request_uri;
    proxy_cache_valid 200 30d;
  }
}
